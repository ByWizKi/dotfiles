#configuration de base de tmux
set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

set -g history-limit 5000
setw -g mode-keys vi

unbind %
bind split-window -h

unbind '"'
bind - split-window -h

unbind r
bind r source-file ~/.tmux.conf

# Thème et statut
set -g status-bg black
set -g status-fg white

